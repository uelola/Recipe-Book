<ng-template appPlaceholder></ng-template>
<div class="row"></div>
<div class="div col-xs-12 col-md-6 col-md-offset-3">
  <!-- <div class="alert alert-danger" *ngIf="error">
    <p>{{ error }}</p>
  </div> -->
  <!-- <app-alert
    [message]="error"
    *ngIf="error"
    (close)="onCloseErrorAlert()"
  ></app-alert> -->
  <div *ngIf="isLoading">
    <app-loading-spinner style="text-align: center"></app-loading-spinner>
  </div>
  <form #authForm="ngForm" (ngSubmit)="onSubmit(authForm)" *ngIf="!isLoading">
    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        class="form-control"
        id="email"
        placeholder="Email"
        ngModel
        name="email"
        required
        email
      />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        class="form-control"
        id="password"
        placeholder="Password"
        ngModel
        name="password"
        required
        minlength="6"
      />
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!authForm.valid">
      {{ isLoginMode ? "Login" : "Sign Up" }}
    </button>
    |
    <button type="button" class="btn btn-primary" (click)="onSwitchMode()">
      Switch to {{ isLoginMode ? "Sign Up" : "Login" }}
    </button>
  </form>
</div>
